<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weatherbot Dashboard</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-meta {
    color: var(--text-dim);
    font-size: 13px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-left: 8px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .card-label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .card-value {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .card-sub {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 4px;
  }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .yellow { color: var(--yellow); }
  section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
  }
  section h2 {
    font-size: 14px;
    margin: 0 0 12px 0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    font-weight: 600;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  th, td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  tr:last-child td { border-bottom: none; }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 24px;
    font-size: 13px;
  }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .refresh-status {
    color: var(--text-dim);
    font-size: 11px;
    margin-top: 4px;
  }
  .pulse {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .error {
    background: rgba(248, 81, 73, 0.1);
    border-color: var(--red);
    color: var(--red);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Weatherbot Dashboard <span class="badge" id="bot-version">…</span></h1>
    <div class="header-meta">
      <span class="pulse"></span>
      <span id="last-update">Loading…</span>
    </div>
  </div>
  <div class="refresh-status">auto-refresh every 30s</div>
</div>

<div id="error-box" style="display:none;"></div>

<div class="grid" id="cards"></div>

<section>
  <h2>Open Positions</h2>
  <div id="open-positions">Loading…</div>
</section>

<section>
  <h2>Recently Resolved</h2>
  <div id="resolved">Loading…</div>
</section>

<script>
const fmt$ = (n) => n == null ? "–" : "$" + Number(n).toFixed(2);
const fmtPct = (n) => n == null ? "–" : (n >= 0 ? "+" : "") + Number(n).toFixed(1) + "%";
const colorClass = (n) => n == null ? "" : n > 0 ? "green" : n < 0 ? "red" : "";

async function fetchState() {
  try {
    const res = await fetch("/api/state");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    render(data);
    document.getElementById("error-box").style.display = "none";
  } catch (err) {
    const box = document.getElementById("error-box");
    box.style.display = "block";
    box.className = "card error";
    box.textContent = "Failed to load: " + err.message;
  }
}

function render(d) {
  document.getElementById("bot-version").textContent = d.bot_version || "—";
  document.getElementById("last-update").textContent =
    "Last update: " + new Date().toLocaleTimeString();

  const ret = d.starting ? ((d.balance - d.starting) / d.starting * 100) : 0;
  const cards = document.getElementById("cards");
  cards.innerHTML = `
    <div class="card">
      <div class="card-label">Balance</div>
      <div class="card-value">${fmt$(d.balance)}</div>
      <div class="card-sub ${colorClass(ret)}">${fmtPct(ret)} from ${fmt$(d.starting)}</div>
    </div>
    <div class="card">
      <div class="card-label">Total PnL</div>
      <div class="card-value ${colorClass(d.total_pnl)}">${(d.total_pnl >= 0 ? "+" : "") + fmt$(d.total_pnl)}</div>
      <div class="card-sub">across ${d.resolved.length} resolved</div>
    </div>
    <div class="card">
      <div class="card-label">Trades</div>
      <div class="card-value">${d.total_trades}</div>
      <div class="card-sub">
        <span class="green">${d.wins}W</span> / <span class="red">${d.losses}L</span>
        ${d.wins + d.losses > 0 ? `· ${Math.round(100 * d.wins / (d.wins + d.losses))}% WR` : ""}
      </div>
    </div>
    <div class="card">
      <div class="card-label">Open</div>
      <div class="card-value">${d.open_positions.length}</div>
      <div class="card-sub">${d.markets_total} markets tracked</div>
    </div>
    <div class="card">
      <div class="card-label">Peak Balance</div>
      <div class="card-value">${fmt$(d.peak_balance)}</div>
      <div class="card-sub">all-time high</div>
    </div>
  `;

  renderOpen(d.open_positions);
  renderResolved(d.resolved);
}

function renderOpen(list) {
  const el = document.getElementById("open-positions");
  if (!list.length) {
    el.innerHTML = '<div class="empty">No open positions</div>';
    return;
  }
  let html = `<table>
    <thead><tr>
      <th>City</th><th>Date</th><th>Bucket</th>
      <th class="num">Entry</th><th class="num">Now</th>
      <th class="num">Cost</th><th class="num">PnL</th>
      <th>Forecast</th>
    </tr></thead><tbody>`;
  for (const p of list) {
    const cls = colorClass(p.unrealized_pnl);
    const sign = p.unrealized_pnl >= 0 ? "+" : "";
    const fc = p.forecast_temp != null ? `${p.forecast_temp}° ${(p.forecast_src || "").toUpperCase()}` : "–";
    html += `<tr>
      <td>${p.city || "–"}</td>
      <td>${p.date || "–"}</td>
      <td>${p.bucket}</td>
      <td class="num">${fmt$(p.entry_price)}</td>
      <td class="num">${fmt$(p.current_price)}</td>
      <td class="num">${fmt$(p.cost)}</td>
      <td class="num ${cls}">${sign}${fmt$(p.unrealized_pnl)}</td>
      <td>${fc}</td>
    </tr>`;
  }
  html += "</tbody></table>";
  el.innerHTML = html;
}

function renderResolved(list) {
  const el = document.getElementById("resolved");
  if (!list.length) {
    el.innerHTML = '<div class="empty">No resolved markets yet</div>';
    return;
  }
  let html = `<table>
    <thead><tr>
      <th>City</th><th>Date</th><th>Result</th>
      <th class="num">PnL</th><th class="num">Actual</th>
    </tr></thead><tbody>`;
  for (const r of list.slice(0, 30)) {
    const cls = r.outcome === "win" ? "green" : r.outcome === "loss" ? "red" : "";
    const sign = (r.pnl || 0) >= 0 ? "+" : "";
    html += `<tr>
      <td>${r.city || "–"}</td>
      <td>${r.date || "–"}</td>
      <td class="${cls}">${(r.outcome || "").toUpperCase()}</td>
      <td class="num ${cls}">${sign}${fmt$(r.pnl)}</td>
      <td class="num">${r.actual != null ? r.actual + "°" : "–"}</td>
    </tr>`;
  }
  html += "</tbody></table>";
  el.innerHTML = html;
}

fetchState();
setInterval(fetchState, 30000);
</script>

</body>
</html>
